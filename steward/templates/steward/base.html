<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Steward Pro{% endblock %}</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    {% load static %}
    <style>
      :root {
        --primary-color: #dc2626;
        --primary-hover: #b91c1c;
        --background-color: #f9fafb;
        --card-background: #ffffff;
        --border-color: #e5e7eb;
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --accent-black: #111827;
        --background-light: #f3f4f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        color: var(--text-main);
        background-color: var(--background-color);
        margin: 0;
        padding: 0;
      }

      .main-container {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .content-wrapper {
        flex: 1;
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem;
      }

      .scroll-container {
        width: 100%;
        overflow-x: auto;
        border: 1px solid var(--border-color);
        border-radius: 8px;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.625rem 1.25rem;
        background: var(--primary-color);
        color: #ffffff;
        border: 1px solid transparent;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        font-size: 0.9375rem;
      }

      .btn-primary:hover {
        background: var(--primary-hover);
      }

      .card {
        background: var(--card-background);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }

      .card-header {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--accent-black);
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 1rem;
      }

      .metric-value {
        font-size: 2rem;
        font-weight: 700;
        color: var(--primary-color);
      }

      .nav-link {
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        transition: all 0.2s ease;
      }
      .nav-link:hover {
        color: var(--text-main);
        background: #f3f4f6;
      }
      .nav-link.active {
        color: var(--primary-color);
        background: #fee2e2;
        font-weight: 600;
      }

      #global-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(4px);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #e5e7eb;
        border-top: 5px solid var(--primary-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loading-text {
        margin-top: 1rem;
        font-size: 1rem;
        font-weight: 500;
        color: var(--text-muted);
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <style>
      .tabs {
        display: flex;
        gap: 0.25rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }

      .tab {
        padding: 0.5rem 1rem;
        border-radius: 6px;
        background: #f1f5f9;
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 500;
      }

      .tab:hover {
        background: #e2e8f0;
        color: var(--text-main);
      }

      .tab.active {
        background: var(--primary-color);
        color: white;
      }

      table.data-table {
        border-collapse: collapse;
        width: 100%;
        font-size: 0.875rem;
      }

      table.data-table th,
      table.data-table td {
        border: 1px solid var(--border-color);
        padding: 0.5rem 0.75rem;
        text-align: left;
      }

      table.data-table th {
        background: var(--background-light);
        font-weight: 600;
        color: var(--text-muted);
      }

      .badge {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .badge-warning {
        background: #fef3c7;
        color: #92400e;
      }

      .badge-success {
        background: #fee2e2; /* Red-100 */
        color: var(--primary-color);
      }

      .badge-info {
        background: #e5e7eb; /* Gray-200 */
        color: var(--text-main);
      }

      /* Pandas to_html styles */
      .table {
        min-width: 100%;
        width: max-content;
        border-collapse: collapse;
        margin-bottom: 1rem;
        background: var(--card-background);
      }
      .table th,
      .table td {
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--border-color);
        text-align: left;
        vertical-align: top;
        white-space: nowrap;
      }
      .table th {
        background: var(--background-light);
        font-weight: 600;
        color: var(--text-muted);
      }
      .table-sm th,
      .table-sm td {
        padding: 0.375rem 0.5rem;
        font-size: 0.75rem;
      }

      /* Find Duplicates & Component Styles */
      .sub-card {
        background: #f8fafc;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1.25rem;
        margin-bottom: 1.5rem;
      }
      .sub-card-header {
        margin-top: 0;
        margin-bottom: 1rem;
        font-size: 1rem;
        color: var(--accent-black);
        font-weight: 600;
      }
      .checkbox-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
      }
      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.875rem;
        color: var(--text-main);
        cursor: pointer;
        user-select: none;
        padding: 0.25rem;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .checkbox-label:hover {
        background: #f1f5f9;
      }
      .checkbox-label input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: var(--primary-color);
      }
      .results-card {
        margin-top: 2rem;
      }
      .results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .results-title {
        margin: 0;
        font-size: 1.125rem;
        color: var(--accent-black);
        font-weight: 700;
      }
      .results-actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .group-title {
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
        font-size: 0.9rem;
      }
      .form-label {
        display: block;
        margin-bottom: 0.375rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-main);
      }
      .form-input {
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        font-size: 0.875rem;
        outline-color: var(--primary-color);
      }
      .btn-secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 1rem;
        background: #ffffff;
        color: var(--text-main);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.875rem;
        text-decoration: none;
      }
      .btn-secondary:hover {
        background: #f1f5f9;
        border-color: var(--text-muted);
      }
      .btn-black {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 1rem;
        background: #000000;
        color: #ffffff;
        border: 1px solid #000000;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.875rem;
        text-decoration: none;
      }
      .btn-black:hover {
        background: #333333;
        border-color: #333333;
      }
    </style>
    {% block extra_css %}{% endblock %}
  </head>

  <body style="margin: 0; min-height: 100vh">
    <div class="main-container">
      <header
        style="
          background: #ffffff;
          border-bottom: 1px solid var(--border-color);
          padding: 1rem 2rem;
          display: flex;
          align-items: center;
          justify-content: space-between;
          z-index: 10;
        "
      >
        <div style="display: flex; align-items: center; gap: 2rem">
          <a href="{% url 'index' %}" style="text-decoration: none">
            <span
              style="
                font-size: 1.5rem;
                font-weight: 800;
                color: var(--primary-color);
              "
              >Steward Pro</span
            >
          </a>
          <nav style="display: flex; gap: 0.5rem">
            <a
              href="{% url 'load_data' %}"
              class="nav-link {% if request.resolver_match.url_name == 'load_data' %}active{% endif %}"
              >Load Data</a
            >
            <a
              href="{% url 'index' %}"
              class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}"
              >Dashboard</a
            >
            <a
              href="{% url 'find_duplicates' %}"
              class="nav-link {% if request.resolver_match.url_name == 'find_duplicates' %}active{% endif %}"
              >Find Duplicates</a
            >
            <a
              href="{% url 'record_list' %}"
              class="nav-link {% if request.resolver_match.url_name == 'record_list' %}active{% endif %}"
              >Records List</a
            >
          </nav>
        </div>
        <a
          href="{% url 'export_data' %}"
          class="btn-primary no-loader"
          style="text-decoration: none"
          >Export Master</a
        >
      </header>

      {% if messages %}
      <div style="padding: 1rem 2rem 0">
        <div style="max-width: 1200px; margin: 0 auto">
          {% for message in messages %}
          <div
            class="toast-left card"
            style="margin-bottom: 1rem; border-left: 4px solid {% if message.tags == 'success' %}#22c55e{% elif message.tags == 'error' %}var(--primary-color){% else %}var(--accent-black){% endif %};"
          >
            {{ message }}
          </div>
          {% endfor %}
        </div>
      </div>
      {% endif %}

      <div class="content-wrapper">{% block content %}{% endblock %}</div>

      <footer
        style="
          text-align: center;
          padding: 1.5rem;
          color: var(--text-muted);
          font-size: 0.875rem;
          border-top: 1px solid var(--border-color);
          background: #ffffff;
        "
      >
        Steward Pro UI
      </footer>
    </div>

    <div id="global-loader">
      <div class="spinner"></div>
      <div class="loading-text"></div>
    </div>

    <script>
      let loadingInterval;
      const loadingPhrases = [
        "Analyzing data patterns…",
        "Applying intelligent matching…",
        "Comparing record similarities…",
        "Detecting duplicate entries…",
        "Evaluating data accuracy…",
        "Clustering similar records…",
        "Refining match results…",
        "Filtering redundant data…",
        "Optimizing data quality…",
        "Finalizing clean dataset…",
      ];

      document.addEventListener("DOMContentLoaded", function () {
        const forms = document.querySelectorAll("form");
        const loader = document.getElementById("global-loader");

        forms.forEach((form) => {
          form.addEventListener("submit", function (e) {
            // Check if it's not a GET form (like search)
            if (form.method.toLowerCase() === "post") {
              showLoader();
            }
          });
        });

        // Handle internal navigation links
        const internalLinks = document.querySelectorAll('a[href^="/"]');
        internalLinks.forEach((link) => {
          link.addEventListener("click", function (e) {
            // Don't show loader for links that open in a new tab
            if (link.target === "_blank") return;

            // Don't show loader for anchor links on the same page
            if (link.pathname === window.location.pathname && link.hash) return;

            // Don't show loader for export links (CSV downloads) or explicitly marked links
            if (
              link.href.includes("export") ||
              link.classList.contains("no-loader") ||
              link.hasAttribute("download")
            )
              return;

            showLoader();
          });
        });

        // Hide loader when page is visible again (e.g. back button)
        window.onpageshow = function (event) {
          if (event.persisted) {
            hideLoader();
          }
        };
      });

      function showLoader(text) {
        const loader = document.getElementById("global-loader");
        const loadingText = loader.querySelector(".loading-text");

        // If loader is already visible, don't restart the animation
        if (loader.style.display === "flex" && !text) {
          return;
        }

        // Clear any existing interval to prevent multiple animations
        if (loadingInterval) {
          clearInterval(loadingInterval);
          loadingInterval = null;
        }

        loader.style.display = "flex";

        if (text) {
          loadingText.innerText = text;
        } else {
          // Start cycling phrases one-way (no loop)
          let currentIndex = 0;
          loadingText.innerText = loadingPhrases[currentIndex];

          loadingInterval = setInterval(() => {
            if (currentIndex < loadingPhrases.length - 1) {
              currentIndex++;
              loadingText.innerText = loadingPhrases[currentIndex];
            } else {
              clearInterval(loadingInterval);
              loadingInterval = null;
            }
          }, 3000);
        }
      }

      function hideLoader() {
        const loader = document.getElementById("global-loader");
        if (loader) loader.style.display = "none";
        if (loadingInterval) {
          clearInterval(loadingInterval);
          loadingInterval = null;
        }
      }
    </script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
